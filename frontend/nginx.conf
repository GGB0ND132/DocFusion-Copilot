server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退：所有未命中静态文件的路径均返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存（Vite 构建产物含 hash，安全可开）
    location ~* \.(js|css|woff|woff2|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 压缩传输
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
}
